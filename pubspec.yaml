name: hivelog_bee
description: تطبيق شامل لإدارة المناحل - HiveLog Bee
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # --- تمت إضافة هذه الحزمة ---
  flutter_dotenv: ^6.0.0
  # --------------------------
  # ✅ الراعي الرسمي للإشعارات (بديل Firebase Messaging)
  onesignal_flutter: ^5.2.0

  # Supabase Client
  supabase_flutter: ^2.5.0

  # Firebase Messaging (يتم الاحتفاظ به مؤقتًا لإدارة الإشعارات)
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2

  # UI Components
  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  fl_chart: ^1.1.1

  # State Management
  provider: ^6.1.1

  # Local Storage & Database
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3

  # Networking & Connectivity
  http: ^1.1.2
  connectivity_plus: ^7.0.0

  # Location & Maps
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.5.0

  # Notifications
  flutter_local_notifications: ^20.1.0

  # AdMob
  google_mobile_ads: ^7.0.0

  # File Operations
  file_picker: ^10.3.10
  path_provider: ^2.1.1
  pdf: ^3.10.7
  csv: ^6.0.0

  # Sharing
  share_plus: ^12.0.1

  # Weather API
  weather: ^3.1.1

  # عرض الوقت بالدقيقة
  timeago: ^3.6.1
  shimmer: ^3.0.0
  # Image Processing
  image_picker: ^1.0.4
  image: ^4.1.3

  # Utils
  uuid: ^4.2.1
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/knowledge/
    # --- تمت إضافة هذا السطر ---
    - .env
    # --------------------------

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
